<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tactical World Model</title>
<style>
:root {
  --bg:       #0d1117;
  --surface:  #161b22;
  --surface2: #1c2128;
  --border:   #30363d;
  --text:     #e6edf3;
  --muted:    #7d8590;
  --blue:     #58a6ff;
  --gold:     #f0c040;
  --red:      #f85149;
  --green:    #3fb950;
  --purple:   #bc8cff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px;
  height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr;
  overflow: hidden;
}

/* ── Header ─────────────────────────────────────────────────────── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
header h1 {
  font-size: 13px;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: 0.4px;
  white-space: nowrap;
}
.team-row { display: flex; align-items: center; gap: 8px; }
.team-row select {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 4px 8px;
  border-radius: 5px;
  font-size: 12px;
  cursor: pointer;
  min-width: 150px;
}
.team-row .vs { color: var(--muted); font-size: 11px; }
.ctx-row { margin-left: auto; display: flex; gap: 10px; align-items: center; }
.ctx-row label { display: flex; align-items: center; gap: 5px; color: var(--muted); font-size: 11px; }
.ctx-row input, .ctx-row select {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 3px 5px;
  border-radius: 4px;
  font-size: 11px;
  width: 52px;
}
.ctx-row select { width: auto; }

/* ── Layout ──────────────────────────────────────────────────────── */
.workspace { display: grid; grid-template-columns: 210px 1fr; overflow: hidden; }

/* ── Sidebar ─────────────────────────────────────────────────────── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-top { overflow-y: auto; flex: 1; padding: 10px; }
.palette-group { margin-bottom: 10px; }
.palette-group h4 {
  font-size: 10px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px;
}
.action-btn {
  display: flex; align-items: center; width: 100%;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 5px 7px; border-radius: 5px;
  margin-bottom: 3px; cursor: pointer; font-size: 12px; text-align: left; gap: 7px;
}
.action-btn:hover { background: #2d333b; border-color: #484f58; }
.action-btn:active { opacity: 0.7; }
.action-btn.attack { border-left: 3px solid var(--blue); }
.action-btn.build  { border-left: 3px solid var(--purple); }
.action-btn.defend { border-left: 3px solid var(--red); }
.kbd {
  margin-left: auto; background: var(--bg); border: 1px solid var(--border);
  border-radius: 3px; padding: 1px 4px; font-size: 9px; color: var(--muted);
  font-family: monospace; flex-shrink: 0;
}

/* Queue */
.sidebar-bottom {
  border-top: 1px solid var(--border); padding: 10px;
  display: flex; flex-direction: column; gap: 6px;
}
.queue-header {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 11px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.queue-count { color: var(--text); }
.queue-list {
  display: flex; flex-direction: column; gap: 2px;
  max-height: 160px; overflow-y: auto;
}
.queue-item {
  display: flex; align-items: center; gap: 5px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 4px; padding: 4px 6px; font-size: 11px;
}
.q-num  { color: var(--muted); width: 14px; text-align: center; flex-shrink: 0; }
.q-lbl  { flex: 1; }
.q-rm   { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 13px; line-height: 1; padding: 0 1px; }
.q-rm:hover { color: var(--red); }
.queue-empty { color: var(--muted); font-size: 11px; font-style: italic; padding: 6px 0; text-align: center; }
.btn-row { display: flex; gap: 6px; }
.btn { flex: 1; padding: 6px 8px; border-radius: 5px; border: 1px solid var(--border); font-size: 12px; font-weight: 500; cursor: pointer; }
.btn-clear { background: var(--surface2); color: var(--muted); }
.btn-clear:hover { color: var(--text); }
.btn-run { background: var(--green); color: #000; border-color: var(--green); font-weight: 600; }
.btn-run:disabled { background: #1f3a24; color: #3a6040; border-color: #1f3a24; cursor: not-allowed; }

/* ── Main area ───────────────────────────────────────────────────── */
.main { display: grid; grid-template-rows: 1fr auto auto auto; overflow: hidden; }

.pitch-wrap {
  position: relative; overflow: hidden; display: flex;
  align-items: center; justify-content: center; padding: 10px; background: var(--bg);
}
canvas { max-width: 100%; max-height: 100%; border-radius: 3px; }

.step-badge {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
  border-radius: 6px; padding: 5px 12px; text-align: center;
  pointer-events: none; white-space: nowrap; display: none;
}
.step-badge.visible { display: block; }
.badge-action { font-size: 14px; font-weight: 600; color: var(--gold); }
.badge-def    { font-size: 10px; color: var(--red); margin-top: 1px; }

.loading-overlay {
  position: absolute; inset: 0; background: rgba(13,17,23,0.82);
  display: none; align-items: center; justify-content: center;
  color: var(--muted); font-size: 12px; border-radius: 3px;
}
.loading-overlay.visible { display: flex; }

/* Playback */
.playback {
  display: flex; align-items: center; gap: 6px; padding: 6px 12px;
  border-top: 1px solid var(--border); background: var(--surface);
}
.ctrl {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 4px 10px; border-radius: 4px;
  cursor: pointer; font-size: 12px;
}
.ctrl:hover:not(:disabled) { background: #2d333b; }
.ctrl:disabled { opacity: 0.35; cursor: not-allowed; }
.ctrl.playing { background: var(--green); color: #000; border-color: var(--green); }
.step-ctr { color: var(--muted); font-size: 11px; min-width: 70px; }
.speed-sel {
  margin-left: auto; background: var(--surface2); border: 1px solid var(--border);
  color: var(--muted); padding: 3px 5px; border-radius: 4px;
  font-size: 10px; cursor: pointer;
}

/* Timeline */
.timeline {
  display: flex; align-items: flex-start; gap: 0; padding: 6px 12px;
  border-top: 1px solid var(--border); overflow-x: auto;
  background: var(--surface); min-height: 46px; scrollbar-width: thin;
}
.tl-empty { color: var(--muted); font-size: 11px; font-style: italic; align-self: center; }
.tl-step {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  cursor: pointer; padding: 3px 6px; border-radius: 5px; flex-shrink: 0;
  border: 1px solid transparent;
}
.tl-step:hover { background: var(--surface2); }
.tl-step.active { background: rgba(240,192,64,0.1); border-color: rgba(240,192,64,0.35); }
.tl-pill {
  font-size: 10px; font-weight: 500; padding: 2px 7px;
  border-radius: 10px; background: var(--surface2); border: 1px solid var(--border); white-space: nowrap;
}
.tl-step.active .tl-pill { background: rgba(240,192,64,0.15); border-color: var(--gold); color: var(--gold); }
.tl-def  { font-size: 9px; color: var(--red); white-space: nowrap; }
.tl-arrow { color: var(--muted); font-size: 11px; padding: 0 2px; margin-top: 5px; align-self: flex-start; }

/* Prob bars */
.prob-section {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
  padding: 7px 12px; border-top: 1px solid var(--border); background: var(--surface);
}
.prob-row { display: flex; flex-direction: column; gap: 3px; }
.prob-meta { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); }
.prob-pct   { color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }
.prob-delta { font-size: 9px; font-variant-numeric: tabular-nums; }
.prob-delta.pos { color: var(--green); }
.prob-delta.neg { color: var(--red); }
.prob-track { height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
.prob-fill  { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
</style>
</head>
<body>

<header>
  <h1>Tactical World Model</h1>
  <div class="team-row">
    <select id="selA"><option value="">— Attacking team —</option></select>
    <span class="vs">vs</span>
    <select id="selB"><option value="">— Defending team —</option></select>
  </div>
  <div class="ctx-row">
    <label>Minute <input type="number" id="iMin"   value="45" min="0" max="90"></label>
    <label>Score  <input type="number" id="iScore" value="0"  min="-5" max="5"></label>
    <label>Zone
      <select id="iZone">
        <option value="0">0 Own</option>
        <option value="1" selected>1 Mid</option>
        <option value="2">2 Attack</option>
        <option value="3">3 Box</option>
      </select>
    </label>
    <label>Phase
      <select id="iPhase">
        <option value="0" selected>Open play</option>
        <option value="1">Set piece</option>
        <option value="2">Counter</option>
        <option value="3">GK dist.</option>
      </select>
    </label>
  </div>
</header>

<div class="workspace">
  <aside class="sidebar">
    <div class="sidebar-top">
      <div id="palette"></div>
    </div>
    <div class="sidebar-bottom">
      <div class="queue-header">
        Sequence <span class="queue-count" id="qCount"></span>
      </div>
      <div id="qList" class="queue-list">
        <div class="queue-empty">Click actions above to build a play</div>
      </div>
      <div class="btn-row">
        <button class="btn btn-clear" onclick="clearAll()">Clear</button>
        <button class="btn btn-run" id="runBtn" onclick="runSim()" disabled>&#9654; Run</button>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="pitch-wrap" id="pitchWrap">
      <canvas id="pitch"></canvas>
      <div class="step-badge" id="badge">
        <div class="badge-action" id="badgeAction"></div>
        <div class="badge-def"    id="badgeDef"></div>
      </div>
      <div class="loading-overlay" id="loader">Running simulation&hellip;</div>
    </div>

    <div class="playback">
      <button class="ctrl" id="btnPrev" onclick="seek(S.step-1)" disabled>&#9664;</button>
      <button class="ctrl" id="btnPlay" onclick="togglePlay()" disabled>&#9654; Play</button>
      <button class="ctrl" id="btnNext" onclick="seek(S.step+1)" disabled>Next &#9654;</button>
      <span class="step-ctr" id="stepCtr">&mdash;</span>
      <select class="speed-sel" id="speedSel">
        <option value="1600">Slow</option>
        <option value="900" selected>Normal</option>
        <option value="400">Fast</option>
      </select>
    </div>

    <div class="timeline" id="timeline">
      <span class="tl-empty">Run a sequence to see the playback timeline</span>
    </div>

    <div class="prob-section">
      <div class="prob-row" id="pAdv">
        <div class="prob-meta">
          <span>P(Advance)</span>
          <span><span class="prob-pct">&mdash;</span> <span class="prob-delta"></span></span>
        </div>
        <div class="prob-track"><div class="prob-fill" style="width:0%;background:var(--blue)"></div></div>
      </div>
      <div class="prob-row" id="pShot">
        <div class="prob-meta">
          <span>P(Shot)</span>
          <span><span class="prob-pct">&mdash;</span> <span class="prob-delta"></span></span>
        </div>
        <div class="prob-track"><div class="prob-fill" style="width:0%;background:var(--gold)"></div></div>
      </div>
      <div class="prob-row" id="pFin">
        <div class="prob-meta">
          <span>P(Final 3rd)</span>
          <span><span class="prob-pct">&mdash;</span> <span class="prob-delta"></span></span>
        </div>
        <div class="prob-track"><div class="prob-fill" style="width:0%;background:var(--green)"></div></div>
      </div>
    </div>
  </main>
</div>

<script>
// ── Action definitions ────────────────────────────────────────────────────────
const ACTIONS = [
  { name:"ADVANCE",      label:"Advance",        key:"W",     cls:"attack" },
  { name:"THROUGH_BALL", label:"Through Ball",   key:"T",     cls:"attack" },
  { name:"DRIBBLE",      label:"Dribble",        key:"E",     cls:"attack" },
  { name:"SHOOT",        label:"Shoot",          key:"Space", cls:"attack" },
  { name:"CROSS",        label:"Cross",          key:"C",     cls:"attack" },
  { name:"SWITCH_LEFT",  label:"Switch Left",    key:"A",     cls:"build"  },
  { name:"SWITCH_RIGHT", label:"Switch Right",   key:"D",     cls:"build"  },
  { name:"HOLD",         label:"Hold / Recycle", key:"S",     cls:"build"  },
  { name:"KEEPER_BALL",  label:"Play Out",       key:"G",     cls:"build"  },
  { name:"PRESS",        label:"High Press",     key:"P",     cls:"defend" },
  { name:"LOW_BLOCK",    label:"Low Block",      key:"L",     cls:"defend" },
];
const GROUP_NAMES = { attack:"Attack", build:"Build-Up", defend:"Defensive" };
const KEY_MAP = {
  "w":"ADVANCE","W":"ADVANCE","ArrowUp":"ADVANCE",
  "s":"HOLD","S":"HOLD","ArrowDown":"HOLD",
  "a":"SWITCH_LEFT","A":"SWITCH_LEFT","ArrowLeft":"SWITCH_LEFT",
  "d":"SWITCH_RIGHT","D":"SWITCH_RIGHT","ArrowRight":"SWITCH_RIGHT",
  "p":"PRESS","P":"PRESS",
  "l":"LOW_BLOCK","L":"LOW_BLOCK",
  " ":"SHOOT",
  "e":"DRIBBLE","E":"DRIBBLE",
  "t":"THROUGH_BALL","T":"THROUGH_BALL",
  "c":"CROSS","C":"CROSS",
  "g":"KEEPER_BALL","G":"KEEPER_BALL",
};

// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  teamA: null, teamB: null,
  queue:   [],   // [{action, alpha}]
  frames:  [],   // ActionResult[] returned by /api/simulate_sequence
  step:    -1,
  playing: false,
  timer:   null,
};

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener("load", async () => {
  buildPalette();
  resizeCanvas();
  drawEmpty();
  await loadTeams();
});
window.addEventListener("resize", () => {
  resizeCanvas();
  if (S.step >= 0) renderFrame(S.step); else drawEmpty();
});
document.addEventListener("keydown", e => {
  if (e.target.tagName === "INPUT" || e.target.tagName === "SELECT") return;
  const a = KEY_MAP[e.key];
  if (a) { e.preventDefault(); addToQueue(a); }
  if (e.key === "Enter") runSim();
});

// ── Palette ───────────────────────────────────────────────────────────────────
function buildPalette() {
  const pal = document.getElementById("palette");
  for (const g of ["attack","build","defend"]) {
    const items = ACTIONS.filter(a => a.cls === g);
    const div = document.createElement("div");
    div.className = "palette-group";
    div.innerHTML = `<h4>${GROUP_NAMES[g]}</h4>`;
    for (const a of items) {
      const btn = document.createElement("button");
      btn.className = `action-btn ${a.cls}`;
      btn.innerHTML = `${a.label}<span class="kbd">${a.key}</span>`;
      btn.onclick = () => addToQueue(a.name);
      div.appendChild(btn);
    }
    pal.appendChild(div);
  }
}

// ── Teams ─────────────────────────────────────────────────────────────────────
async function loadTeams() {
  try {
    const r = await fetch("/api/teams");
    if (!r.ok) return;
    const teams = await r.json();
    const [sA, sB] = [document.getElementById("selA"), document.getElementById("selB")];
    for (const t of teams) {
      sA.appendChild(new Option(t.team_name, t.team_id));
      sB.appendChild(new Option(t.team_name, t.team_id));
    }
    if (teams.length >= 2) {
      sA.value = teams[0].team_id; S.teamA = teams[0].team_id;
      sB.value = teams[1].team_id; S.teamB = teams[1].team_id;
    }
    sA.onchange = () => { S.teamA = +sA.value || null; };
    sB.onchange = () => { S.teamB = +sB.value || null; };
  } catch(e) { console.error(e); }
}

// ── Queue ─────────────────────────────────────────────────────────────────────
function addToQueue(name) {
  if (S.queue.length >= 12) return;
  S.queue.push({ action: name, alpha: 1.0 });
  redrawQueue();
}
function removeStep(i) { S.queue.splice(i, 1); redrawQueue(); }
function redrawQueue() {
  const list = document.getElementById("qList");
  const ctr  = document.getElementById("qCount");
  const run  = document.getElementById("runBtn");
  ctr.textContent  = S.queue.length ? `(${S.queue.length})` : "";
  run.disabled     = S.queue.length === 0;
  if (!S.queue.length) {
    list.innerHTML = '<div class="queue-empty">Click actions above to build a play</div>';
    return;
  }
  list.innerHTML = S.queue.map((q, i) => {
    const a = ACTIONS.find(a => a.name === q.action);
    return `<div class="queue-item">
      <span class="q-num">${i+1}</span>
      <span class="q-lbl">${a ? a.label : q.action}</span>
      <button class="q-rm" onclick="removeStep(${i})">&#215;</button>
    </div>`;
  }).join("");
}
function clearAll() {
  S.queue = []; S.frames = []; S.step = -1; stopPlay();
  redrawQueue(); drawTimeline([]); clearProbs();
  document.getElementById("badge").classList.remove("visible");
  updateControls(); drawEmpty();
}

// ── Simulation ────────────────────────────────────────────────────────────────
async function runSim() {
  if (!S.teamA || !S.teamB) { alert("Select both teams first."); return; }
  if (!S.queue.length) return;
  stopPlay();
  document.getElementById("loader").classList.add("visible");
  document.getElementById("runBtn").disabled = true;
  try {
    const res = await fetch("/api/simulate_sequence", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        team_id_a: +S.teamA,
        team_id_b: +S.teamB,
        context: {
          score_diff: +document.getElementById("iScore").value || 0,
          minute:     +document.getElementById("iMin").value   || 45,
          zone:       +document.getElementById("iZone").value  || 1,
          phase:      +document.getElementById("iPhase").value || 0,
          poss_team:  0,
        },
        sequence:        S.queue,
        minute_per_step: 0.5,
      }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: res.statusText }));
      throw new Error(err.detail || "Server error");
    }
    const data = await res.json();
    S.frames = data.frames; S.step = 0;
    drawTimeline(S.frames);
    renderFrame(0);
    updateControls();
  } catch(e) {
    alert("Simulation failed: " + e.message);
  } finally {
    document.getElementById("loader").classList.remove("visible");
    document.getElementById("runBtn").disabled = S.queue.length === 0;
  }
}

// ── Playback ──────────────────────────────────────────────────────────────────
function seek(n) {
  if (!S.frames.length) return;
  S.step = Math.max(0, Math.min(n, S.frames.length - 1));
  renderFrame(S.step); updateControls();
}
function togglePlay() { S.playing ? stopPlay() : startPlay(); }
function startPlay() {
  if (S.step >= S.frames.length - 1) S.step = 0;
  S.playing = true;
  document.getElementById("btnPlay").textContent = "&#9646;&#9646; Pause";
  document.getElementById("btnPlay").classList.add("playing");
  tick();
}
function tick() {
  if (!S.playing) return;
  renderFrame(S.step); updateControls();
  if (S.step < S.frames.length - 1) {
    S.step++;
    S.timer = setTimeout(tick, +document.getElementById("speedSel").value);
  } else { stopPlay(); }
}
function stopPlay() {
  S.playing = false; clearTimeout(S.timer);
  document.getElementById("btnPlay").textContent = "&#9654; Play";
  document.getElementById("btnPlay").classList.remove("playing");
}
function updateControls() {
  const n = S.frames.length;
  document.getElementById("btnPrev").disabled = n === 0 || S.step <= 0;
  document.getElementById("btnNext").disabled = n === 0 || S.step >= n - 1;
  document.getElementById("btnPlay").disabled = n === 0;
  document.getElementById("stepCtr").textContent = n ? `Step ${S.step+1} / ${n}` : "—";
}

// ── Frame rendering ───────────────────────────────────────────────────────────
function renderFrame(n) {
  const f = S.frames[n]; if (!f) return;
  drawPitch();
  drawPlayers(f.positions, f.roles, f.mask);
  const badge = document.getElementById("badge");
  document.getElementById("badgeAction").textContent = f.action;
  const def = f.context && f.context.defense_response;
  document.getElementById("badgeDef").textContent = def ? "↩ Defense: " + def : "";
  badge.classList.add("visible");
  document.querySelectorAll(".tl-step").forEach((el, i) =>
    el.classList.toggle("active", i === n));
  renderProbs(f.probs, f.deltas);
}

// ── Probability bars ──────────────────────────────────────────────────────────
function renderProbs(p, d) {
  if (!p) return;
  setProb("pAdv",  p.p_advance,     d && d.p_advance);
  setProb("pShot", p.p_shot,        d && d.p_shot);
  setProb("pFin",  p.p_final_third, d && d.p_final_third);
}
function setProb(id, val, delta) {
  const row  = document.getElementById(id);
  const pct  = row.querySelector(".prob-pct");
  const dEl  = row.querySelector(".prob-delta");
  const fill = row.querySelector(".prob-fill");
  pct.textContent  = val != null ? Math.round(val * 100) + "%" : "—";
  fill.style.width = val != null ? Math.round(val * 100) + "%" : "0%";
  if (delta != null) {
    const s = delta >= 0 ? "+" : "";
    dEl.textContent = s + Math.round(delta * 100) + "%";
    dEl.className   = "prob-delta" + (delta > 0.005 ? " pos" : delta < -0.005 ? " neg" : "");
  } else { dEl.textContent = ""; dEl.className = "prob-delta"; }
}
function clearProbs() { ["pAdv","pShot","pFin"].forEach(id => setProb(id, null, null)); }

// ── Timeline ──────────────────────────────────────────────────────────────────
function drawTimeline(frames) {
  const tl = document.getElementById("timeline");
  if (!frames.length) {
    tl.innerHTML = '<span class="tl-empty">Run a sequence to see the playback timeline</span>';
    return;
  }
  let html = "";
  frames.forEach((f, i) => {
    if (i > 0) html += '<span class="tl-arrow">→</span>';
    const def = f.context && f.context.defense_response || "";
    html += `<div class="tl-step${i===0?" active":""}" onclick="seek(${i})">
      <div class="tl-pill">${f.action}</div>
      ${def ? `<div class="tl-def">↩ ${def}</div>` : ""}
    </div>`;
  });
  tl.innerHTML = html;
}

// ── Canvas / Pitch ────────────────────────────────────────────────────────────
let CW = 800, CH = 520;
function resizeCanvas() {
  const wrap   = document.getElementById("pitchWrap");
  const canvas = document.getElementById("pitch");
  const ratio  = 105 / 68;
  const mw = wrap.clientWidth  - 20;
  const mh = wrap.clientHeight - 20;
  if (mw / ratio <= mh) { CW = mw; CH = Math.round(mw / ratio); }
  else                  { CH = mh; CW = Math.round(mh * ratio); }
  canvas.width = CW; canvas.height = CH;
}
const px = x => x * CW;
const py = y => y * CH;

function drawEmpty() {
  drawPitch();
  const ctx = document.getElementById("pitch").getContext("2d");
  ctx.fillStyle    = "rgba(255,255,255,0.18)";
  ctx.font         = Math.round(CH * 0.032) + "px sans-serif";
  ctx.textAlign    = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("Build a sequence and click Run to simulate", px(0.5), py(0.5));
  ctx.textBaseline = "alphabetic";
}

function drawPitch() {
  const canvas = document.getElementById("pitch");
  const ctx    = canvas.getContext("2d");
  ctx.clearRect(0, 0, CW, CH);

  // Pitch background
  ctx.fillStyle = "#1a4731";
  ctx.fillRect(0, 0, CW, CH);

  // Alternating stripes
  for (let i = 0; i < 10; i++) {
    if (i % 2 === 0) {
      ctx.fillStyle = "rgba(0,0,0,0.06)";
      ctx.fillRect(px(i/10), 0, px(0.1), CH);
    }
  }

  const P = 0.04;
  ctx.strokeStyle = "rgba(255,255,255,0.7)";
  ctx.lineWidth   = 1.5;

  // Boundary
  ctx.strokeRect(px(P), py(P), px(1-2*P), py(1-2*P));

  // Halfway line + centre circle
  ctx.beginPath();
  ctx.moveTo(px(0.5), py(P));
  ctx.lineTo(px(0.5), py(1-P));
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(px(0.5), py(0.5), px(0.087), 0, 2*Math.PI);
  ctx.stroke();

  // Penalty areas
  const [paW, paH, paT] = [0.157, 0.593, (1-0.593)/2];
  ctx.strokeRect(px(P),       py(paT), px(paW), py(paH));
  ctx.strokeRect(px(1-P-paW), py(paT), px(paW), py(paH));

  // 6-yard boxes
  const [sbW, sbH, sbT] = [0.057, 0.264, (1-0.264)/2];
  ctx.strokeRect(px(P),       py(sbT), px(sbW), py(sbH));
  ctx.strokeRect(px(1-P-sbW), py(sbT), px(sbW), py(sbH));

  // Goals
  const [gW, gH, gT] = [0.014, 0.112, (1-0.112)/2];
  ctx.strokeRect(px(P-gW), py(gT), px(gW), py(gH));
  ctx.strokeRect(px(1-P),  py(gT), px(gW), py(gH));

  // Zone dividers (dashed)
  ctx.strokeStyle = "rgba(255,255,255,0.14)";
  ctx.setLineDash([5, 5]);
  ctx.lineWidth = 1;
  [1/3, 2/3].forEach(x => {
    ctx.beginPath();
    ctx.moveTo(px(x), py(P));
    ctx.lineTo(px(x), py(1-P));
    ctx.stroke();
  });
  ctx.setLineDash([]);

  // Zone labels
  ctx.fillStyle    = "rgba(255,255,255,0.11)";
  ctx.font         = Math.round(CH * 0.026) + "px sans-serif";
  ctx.textAlign    = "center";
  ctx.textBaseline = "top";
  ctx.fillText("Zone 0", px(1/6), py(P + 0.01));
  ctx.fillText("Zone 1", px(3/6), py(P + 0.01));
  ctx.fillText("Zone 2", px(5/6), py(P + 0.01));
  ctx.textBaseline = "alphabetic";
}

function drawPlayers(positions, roles, mask) {
  const ctx = document.getElementById("pitch").getContext("2d");
  const R   = Math.max(7, Math.round(CW * 0.011));

  for (let i = 0; i < positions.length; i++) {
    if (mask[i]) continue;
    const x       = px(positions[i][0]);
    const y       = py(positions[i][1]);
    const isMate  = roles[i][0] > 0.5;
    const isActor = roles[i][1] > 0.5;
    const color   = isActor ? "#f0c040" : isMate ? "#58a6ff" : "#f85149";
    const r       = isActor ? R + 2 : R;

    ctx.shadowColor = "rgba(0,0,0,0.55)";
    ctx.shadowBlur  = 5;
    ctx.beginPath(); ctx.arc(x, y, r, 0, 2*Math.PI);
    ctx.fillStyle = color; ctx.fill();
    ctx.shadowBlur = 0;

    ctx.strokeStyle = "rgba(255,255,255,0.4)";
    ctx.lineWidth = 1;
    ctx.stroke();

    if (isActor) {
      ctx.beginPath(); ctx.arc(x, y, r + 4, 0, 2*Math.PI);
      ctx.strokeStyle = "rgba(240,192,64,0.5)";
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }
}
